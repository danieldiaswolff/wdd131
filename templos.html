<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WDD 131 – Álbum de Templos</title>
  <meta name="description" content="Álbum de imagens de templos da Igreja de Jesus Cristo dos Santos dos Últimos Dias.">
  <meta name="author" content="Daniel Dias Wolff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="estilos/templos.css">
  <link rel="stylesheet" href="estilos/templos-grande.css">
  <script src="scripts/templos.js" defer></script>
</head>

<body>
  <header>
    <div class="header-bar">
      <span class="site-title">Álbum do Templo</span>
      <button type="button" class="menu-btn" id="menu-btn" aria-expanded="false" aria-controls="nav-menu"
        aria-label="Abrir menu de navegação">☰</button>
      <nav id="nav-menu">
        <a href="index.html">Home</a>
        <a href="#antigo">Old</a>
        <a href="#novo">New</a>
        <a href="#grande">Large</a>
        <a href="#pequeno">Small</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>Templos da Igreja</h1>

    <figure id="antigo">
      <img src="imagens/templos/salt_lake_temple_renovation_rendering.jpg" alt="Templo de Salt Lake" width="800"
        height="450" loading="lazy">
      <figcaption>Templo de Salt Lake</figcaption>
    </figure>
    <figure>
      <img src="imagens/templos/nauvoo_temple_lds.jpg" alt="Templo de Nauvoo" width="800" height="500"
        loading="lazy">
      <figcaption>Templo de Nauvoo</figcaption>
    </figure>
    <figure>
      <img src="imagens/templos/manti_temple_lds.jpg" alt="Templo de Manti" width="800" height="501" loading="lazy">
      <figcaption>Templo de Manti</figcaption>
    </figure>
    <figure id="grande">
      <img src="imagens/templos/sao_paulo_brazil_temple_lds.jpg" alt="Templo de São Paulo" width="800" height="500"
        loading="lazy">
      <figcaption>Templo de São Paulo</figcaption>
    </figure>
    <figure>
      <img src="imagens/templos/jordan_river_temple_exterior_images.jpg" alt="Templo de Jordan River" width="800"
        height="618" loading="lazy">
      <figcaption>Templo de Jordan River</figcaption>
    </figure>
    <figure>
      <img src="imagens/templos/hong_kong_china_temple.jpg" alt="Templo de Hong Kong" width="800" height="1030"
        loading="lazy">
      <figcaption>Templo de Hong Kong</figcaption>
    </figure>
    <figure id="novo">
      <img src="imagens/templos/brasilia_brazil_temple_exterior.jpg" alt="Templo de Brasília" width="800" height="533"
        loading="lazy">
      <figcaption>Templo de Brasília</figcaption>
    </figure>
    <figure id="pequeno">
      <img src="imagens/templos/colonia_juarez_mexico_temple_lds.jpg" alt="Templo de Colonia Juárez" width="800"
        height="500" loading="lazy">
      <figcaption>Templo de Colonia Juárez</figcaption>
    </figure>
  </main>

  <footer>
    <p>&copy;<span id="ano"></span> Daniel Dias Wolff - Brasil</p>
    <p id="ultimaModificacao"></p>
  </footer>
</body>

</html>
